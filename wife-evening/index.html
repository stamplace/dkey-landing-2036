<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>הזמנה אישית להערב ❤️</title>
  <meta name="description" content="הזמנה אישית, עדינה ומצחיקה להערב." />
  <meta property="og:title" content="הזמנה אישית להערב ❤️" />
  <meta property="og:description" content="מחכה לאישור הגעה..." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#ff4f8b" />
  <style>
    :root {
      --bg1: #16030d;
      --bg2: #3d0a24;
      --pink: #ff6fae;
      --rose: #ff4f8b;
      --gold: #ffe0a3;
      --white: #fff9fc;
      --soft: rgba(255,255,255,.72);
      --glass: rgba(255,255,255,.10);
      --border: rgba(255,255,255,.20);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,111,174,.42), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(255,224,163,.28), transparent 26%),
        radial-gradient(circle at 50% 92%, rgba(255,79,139,.26), transparent 35%),
        linear-gradient(145deg, var(--bg1), var(--bg2) 55%, #12020a);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      filter: blur(10px);
      opacity: .18;
      pointer-events: none;
      background: radial-gradient(circle, #fff, transparent 62%);
      animation: floaty 8s ease-in-out infinite;
    }

    body::before { top: -90px; right: -70px; }
    body::after { bottom: -120px; left: -80px; animation-delay: -3s; }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
      position: relative;
      isolation: isolate;
    }

    .sparkles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sparkles span {
      position: absolute;
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.8);
      box-shadow: 0 0 18px rgba(255,255,255,.78);
      animation: rise 7s linear infinite;
      bottom: -30px;
    }

    .sparkles span:nth-child(1){ right: 10%; animation-delay: 0s; }
    .sparkles span:nth-child(2){ right: 22%; animation-delay: 1.2s; width: 4px; height: 4px; }
    .sparkles span:nth-child(3){ right: 40%; animation-delay: 2.1s; }
    .sparkles span:nth-child(4){ right: 58%; animation-delay: .5s; width: 5px; height: 5px; }
    .sparkles span:nth-child(5){ right: 78%; animation-delay: 3s; }
    .sparkles span:nth-child(6){ right: 88%; animation-delay: 4.2s; width: 4px; height: 4px; }

    .card {
      width: min(560px, 100%);
      position: relative;
      z-index: 1;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.07));
      box-shadow:
        0 28px 80px rgba(0,0,0,.38),
        inset 0 1px 0 rgba(255,255,255,.20);
      backdrop-filter: blur(18px);
      border-radius: 34px;
      padding: 28px 22px 24px;
      text-align: center;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.20), transparent);
      transform: translateX(-100%);
      animation: shine 4.4s ease-in-out infinite;
      pointer-events: none;
    }

    .seal {
      width: 96px;
      height: 96px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 30px;
      background:
        radial-gradient(circle at 30% 20%, #fff, transparent 18%),
        linear-gradient(145deg, var(--rose), #8c1a4b);
      box-shadow: 0 18px 42px rgba(255,79,139,.38);
      font-size: 44px;
      animation: pulse 2.2s ease-in-out infinite;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: clamp(15px, 3.6vw, 18px);
      letter-spacing: .03em;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 12vw, 68px);
      line-height: .95;
      letter-spacing: -0.06em;
      text-shadow: 0 10px 40px rgba(255,111,174,.36);
    }

    .subtitle {
      margin: 16px auto 0;
      max-width: 420px;
      color: var(--soft);
      font-size: clamp(18px, 5vw, 24px);
      line-height: 1.35;
      font-weight: 650;
    }

    .ticket {
      margin: 22px auto 0;
      display: grid;
      gap: 10px;
      max-width: 430px;
      padding: 18px;
      border-radius: 24px;
      border: 1px dashed rgba(255,255,255,.28);
      background: rgba(255,255,255,.08);
    }

    .line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      font-size: 16px;
      color: rgba(255,255,255,.82);
    }

    .line strong {
      color: #fff;
      font-size: 17px;
    }

    .cta {
      margin: 26px auto 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 64px;
      padding: 0 24px;
      border-radius: 999px;
      border: 0;
      background: linear-gradient(135deg, #25d366, #13b95a);
      color: white;
      text-decoration: none;
      font-size: clamp(17px, 4.7vw, 22px);
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(37,211,102,.28);
      animation: wiggle 1.55s ease-in-out infinite;
      transform-origin: center;
      position: relative;
    }

    .cta::after {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: inherit;
      border: 2px solid rgba(37,211,102,.34);
      animation: ring 1.8s ease-out infinite;
    }

    .small {
      margin: 18px 0 0;
      color: rgba(255,255,255,.56);
      font-size: 14px;
    }

    @keyframes wiggle {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      20% { transform: translateY(-3px) rotate(1.2deg) scale(1.025); }
      45% { transform: translateY(2px) rotate(-1.1deg) scale(.995); }
      70% { transform: translateY(-2px) rotate(.8deg) scale(1.015); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @keyframes ring {
      from { opacity: .9; transform: scale(.98); }
      to { opacity: 0; transform: scale(1.16); }
    }

    @keyframes shine {
      0%, 55% { transform: translateX(-110%); opacity: 0; }
      70% { opacity: 1; }
      100% { transform: translateX(110%); opacity: 0; }
    }

    @keyframes rise {
      from { transform: translateY(0) scale(.8); opacity: 0; }
      18% { opacity: .8; }
      to { transform: translateY(-110vh) scale(1.4); opacity: 0; }
    }

    @keyframes floaty {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(18px,22px,0) scale(1.06); }
    }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <main>
    <section class="card" aria-label="הזמנה אישית להערב">
      <div class="seal" aria-hidden="true">❤️</div>
      <p class="eyebrow">הזמנה רשמית ביותר</p>
      <h1>הנך מוזמנת</h1>
      <p class="subtitle">היום בערב, לאחר שובך, לאירוע זוגי פרטי עם בעלך האוהב.</p>

      <div class="ticket" aria-label="פרטי האירוע">
        <div class="line"><span>קוד לבוש</span><strong>חיוך חובה</strong></div>
        <div class="line"><span>מיקום</span><strong>אצלנו בלב</strong></div>
        <div class="line"><span>סטטוס</span><strong>ממתין לאישור הגעה</strong></div>
      </div>

      <a class="cta" href="https://wa.me/972527812215?text=%D7%90%D7%A0%D7%99%20%D7%A8%D7%95%D7%A6%D7%94%20%D7%9C%D7%A9%D7%A8%D7%99%D7%99%D7%9F%20%D7%90%D7%AA%20%D7%94%D7%A2%D7%A8%D7%91%20%E2%9C%85%F0%9F%93%8C%E2%9D%A4%EF%B8%8F" target="_blank" rel="noopener">
        אני רוצה לשריין את הערב ✅📌❤️
      </a>

      <p class="small">נא לאשר בהקדם. מספר המקומות מוגבל לשניים.</p>
    </section>
  </main>
</body>
</html>
