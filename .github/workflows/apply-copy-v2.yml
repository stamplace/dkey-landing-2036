name: Apply DKey Copy v2

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to update
        required: true
        default: copy-dkey-site-copy-v2
      commit_message:
        description: Commit message
        required: true
        default: "feat(copy): apply DKey site copy v2 to demo"

permissions:
  contents: write

jobs:
  apply-copy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Verify copy applier exists
        run: test -f tools/apply-copy-v2.mjs

      - name: Apply DKey copy v2
        run: node tools/apply-copy-v2.mjs

      - name: Show diff
        run: git diff -- demo.html

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- demo.html; then
            echo "No demo.html changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo.html
          git commit -m "${{ inputs.commit_message }}"
          git push origin HEAD:${{ inputs.target_branch }}
