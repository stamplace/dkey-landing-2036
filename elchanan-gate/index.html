<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>אלחנן שערים חשמליים</title>
  <meta name="description" content="אלחנן שערים חשמליים — פותחים לך את הבית יפה." />
  <meta property="og:title" content="אלחנן שערים חשמליים" />
  <meta property="og:description" content="פותחים לך את הבית יפה." />
  <meta name="theme-color" content="#070a12" />

  <style>
    :root{
      --bg:#070a12;
      --text:#f8fafc;
      --muted:rgba(248,250,252,.72);
      --gold:#ffd166;
      --green:#25d366;
      --metal:#151b24;
      --metal2:#283241;
      --stone:#6f675b;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      max-width:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;
    }

    body{position:fixed;inset:0}

    .page{
      position:relative;
      width:100vw;
      height:100dvh;
      max-width:100vw;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:calc(16px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
      isolation:isolate;
      background:
        radial-gradient(circle at 50% 10%, rgba(97,132,190,.34), transparent 27%),
        radial-gradient(circle at 50% 55%, rgba(255,209,102,.11), transparent 34%),
        linear-gradient(180deg,#050812 0%,#0a1220 50%,#07090d 100%);
    }

    .page::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), transparent 38%),
        radial-gradient(circle at 20% 22%, rgba(255,209,102,.10), transparent 18%);
      pointer-events:none;
      z-index:-5;
    }

    .top{
      width:100%;
      max-width:420px;
      text-align:center;
      z-index:10;
      padding-top:4px;
      text-shadow:0 4px 24px rgba(0,0,0,.65);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.075);
      backdrop-filter:blur(14px);
      color:rgba(255,255,255,.82);
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    h1{
      margin:12px 0 8px;
      font-size:clamp(34px,10.5vw,52px);
      line-height:.98;
      letter-spacing:-.055em;
    }

    .lead{
      margin:0 auto;
      max-width:330px;
      color:var(--muted);
      font-size:clamp(17px,4.8vw,21px);
      font-weight:850;
      line-height:1.25;
    }

    .visual{
      position:relative;
      width:min(100%,430px);
      height:min(55dvh,440px);
      min-height:350px;
      max-width:100vw;
      overflow:hidden;
      z-index:2;
      margin:auto 0 8px;
      border-radius:26px;
    }

    .house{
      position:absolute;
      left:50%;
      top:8px;
      width:88%;
      height:74%;
      transform:translateX(-50%);
      opacity:.92;
      z-index:1;
    }

    .roof{
      position:absolute;
      left:50%;
      top:0;
      width:92%;
      height:92px;
      transform:translateX(-50%);
      background:linear-gradient(180deg,#252b36,#0f141d);
      clip-path:polygon(4% 100%,50% 5%,96% 100%);
      filter:drop-shadow(0 18px 36px rgba(0,0,0,.55));
    }

    .wall{
      position:absolute;
      left:50%;
      top:78px;
      width:78%;
      height:220px;
      transform:translateX(-50%);
      border-radius:18px 18px 0 0;
      background:
        linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px) 0 0/24px 24px,
        linear-gradient(180deg,#232a35,#111821);
      box-shadow:0 22px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.10);
    }

    .lamp{
      position:absolute;
      top:120px;
      width:18px;
      height:30px;
      border-radius:999px;
      background:linear-gradient(#fff3c4,#eaa82b);
      box-shadow:
        0 0 25px 8px rgba(255,209,102,.38),
        0 0 75px 25px rgba(255,209,102,.15);
      z-index:3;
    }
    .lamp.l{left:14%}
    .lamp.r{right:14%}

    .studio{
      position:absolute;
      left:50%;
      bottom:66px;
      width:70%;
      height:47%;
      transform:translateX(-50%) scale(.98);
      border-radius:22px 22px 8px 8px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,209,102,.48), transparent 24%),
        linear-gradient(135deg,rgba(255,209,102,.18),transparent 38%),
        linear-gradient(180deg,#241b16,#0e1119 68%);
      box-shadow:0 0 50px rgba(255,209,102,.25);
      opacity:.20;
      transition:opacity 1s ease .35s, transform 1s ease .35s;
      overflow:hidden;
      z-index:2;
    }

    .opened .studio{
      opacity:1;
      transform:translateX(-50%) scale(1);
    }

    .studio::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px) 0 0/32px 100%,
        linear-gradient(180deg,transparent,rgba(0,0,0,.35));
      opacity:.75;
    }

    .mic{
      position:absolute;
      left:50%;
      top:24%;
      width:18px;
      height:48px;
      transform:translateX(-50%);
      border-radius:999px;
      background:linear-gradient(90deg,#0b0f16,#d7dde8,#121923);
      box-shadow:0 0 22px rgba(255,255,255,.28);
      z-index:2;
    }
    .mic::before{
      content:"";
      position:absolute;
      left:50%;
      top:-18px;
      width:44px;
      height:44px;
      transform:translateX(-50%);
      border-radius:50%;
      border:2px solid rgba(255,255,255,.34);
    }
    .mic::after{
      content:"";
      position:absolute;
      left:50%;
      top:46px;
      width:3px;
      height:58px;
      transform:translateX(-50%);
      background:rgba(255,255,255,.28);
    }

    .speaker{
      position:absolute;
      top:34%;
      width:48px;
      height:78px;
      border-radius:10px;
      background:linear-gradient(180deg,#1a202b,#070a10);
      border:1px solid rgba(255,255,255,.12);
      z-index:2;
      box-shadow:0 15px 25px rgba(0,0,0,.4);
    }
    .speaker.l{left:18px}
    .speaker.r{right:18px}
    .speaker::before,.speaker::after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      border-radius:50%;
      background:#111827;
      border:1px solid rgba(255,255,255,.13);
    }
    .speaker::before{top:12px;width:19px;height:19px}
    .speaker::after{bottom:12px;width:31px;height:31px}

    .driveway{
      position:absolute;
      left:50%;
      bottom:-32px;
      width:100%;
      height:45%;
      transform:translateX(-50%);
      clip-path:polygon(28% 0,72% 0,100% 100%,0 100%);
      background:
        repeating-linear-gradient(90deg,rgba(255,255,255,.035) 0 2px,transparent 2px 34px),
        linear-gradient(180deg,#242832,#12151b 72%,#07080b);
      z-index:0;
    }

    .gate-area{
      position:absolute;
      left:50%;
      bottom:24px;
      width:min(100%,420px);
      height:72%;
      transform:translateX(-50%);
      overflow:hidden;
      z-index:5;
    }

    .post{
      position:absolute;
      bottom:0;
      width:42px;
      height:80%;
      border-radius:12px 12px 4px 4px;
      background:
        linear-gradient(90deg,rgba(255,255,255,.12),transparent 28% 72%,rgba(0,0,0,.26)),
        repeating-linear-gradient(180deg,#777064 0 18px,#5e574e 18px 22px,#857b6d 22px 40px);
      box-shadow:0 18px 35px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.12);
      z-index:7;
    }
    .post.l{left:0}
    .post.r{right:0}

    .keypad{
      position:absolute;
      right:8px;
      top:42%;
      width:24px;
      height:36px;
      border-radius:7px;
      background:#101721;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 0 15px rgba(37,211,102,.18);
    }
    .keypad::after{
      content:"";
      position:absolute;
      right:8px;
      bottom:8px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px var(--green);
    }

    .track{
      position:absolute;
      left:38px;
      right:38px;
      bottom:4px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(#6a7380,#1a2028);
      box-shadow:0 3px 0 rgba(0,0,0,.55);
      z-index:8;
    }

    .motor{
      position:absolute;
      left:48px;
      bottom:14px;
      width:62px;
      height:56px;
      border-radius:10px 10px 5px 5px;
      background:linear-gradient(#323c4c,#121923);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 13px 25px rgba(0,0,0,.5);
      z-index:11;
    }
    .motor::after{
      content:"";
      position:absolute;
      right:13px;
      bottom:13px;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 16px var(--green);
    }

    .gate{
      position:absolute;
      bottom:16px;
      width:calc(50% - 38px);
      height:62%;
      border-radius:8px;
      overflow:hidden;
      background:
        linear-gradient(90deg,rgba(255,255,255,.14),transparent 18% 82%,rgba(0,0,0,.30)),
        repeating-linear-gradient(90deg,#202936 0 7px,#0c1118 7px 13px,#2d3746 13px 16px,#0f151e 16px 29px),
        linear-gradient(180deg,#2c3645,#0e141d);
      border:2px solid rgba(255,255,255,.16);
      box-shadow:0 22px 38px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.13);
      transition:transform 1.35s cubic-bezier(.2,.82,.18,1),filter 1.35s;
      will-change:transform;
      z-index:9;
    }
    .gate::before,.gate::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:14px;
      background:linear-gradient(#3b4655,#121821);
      z-index:2;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    }
    .gate::before{top:18px}
    .gate::after{bottom:22px}
    .gate.l{left:38px}
    .gate.r{right:38px}

    .opened .gate.l{transform:translateX(-74%);filter:brightness(.82)}
    .opened .gate.r{transform:translateX(74%);filter:brightness(.82)}

    .reveal-copy{
      position:absolute;
      left:50%;
      bottom:84px;
      width:min(86%,340px);
      transform:translateX(-50%) translateY(16px);
      opacity:0;
      text-align:center;
      z-index:12;
      transition:opacity .55s ease .9s, transform .55s ease .9s;
      pointer-events:none;
    }
    .opened .reveal-copy{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .reveal-copy strong{
      display:block;
      font-size:clamp(21px,6vw,28px);
      line-height:1.05;
      text-shadow:0 4px 18px rgba(0,0,0,.75);
    }
    .reveal-copy span{
      display:block;
      margin-top:6px;
      color:rgba(255,255,255,.78);
      font-weight:750;
      font-size:14px;
    }

    .bottom{
      width:100%;
      max-width:420px;
      z-index:20;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:9px;
    }

    .btn{
      width:min(100%,370px);
      min-height:62px;
      border:0;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:15px 20px;
      text-decoration:none;
      color:#08110b;
      background:linear-gradient(135deg,#2df072,#25d366 48%,#b7ffd8);
      box-shadow:0 18px 42px rgba(37,211,102,.34), inset 0 1px 0 rgba(255,255,255,.55);
      font-size:clamp(19px,5.4vw,24px);
      font-weight:950;
      cursor:pointer;
      animation:pulse 1.65s ease-in-out infinite;
    }

    @keyframes pulse{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-4px) scale(1.018)}
    }

    .opened .btn{
      animation:none;
      background:linear-gradient(135deg,#ffd166,#fff1bd);
      box-shadow:0 18px 42px rgba(255,209,102,.30), inset 0 1px 0 rgba(255,255,255,.55);
    }

    .status{
      min-height:20px;
      color:rgba(255,255,255,.68);
      font-weight:750;
      font-size:13px;
      text-align:center;
      text-shadow:0 3px 16px rgba(0,0,0,.85);
    }

    @media(max-height:690px){
      .visual{height:52dvh;min-height:318px}
      h1{font-size:clamp(30px,9vw,44px)}
      .lead{font-size:16px}
      .btn{min-height:56px}
      .badge{font-size:12px}
    }

    @media(max-width:360px){
      .page{padding-inline:12px}
      .post{width:36px}
      .gate-area{width:100%}
      .gate.l{left:34px}
      .gate.r{right:34px}
      .gate{width:calc(50% - 34px)}
    }
  </style>
</head>

<body>
  <main class="page" id="page">
    <section class="top">
      <div class="badge">שערים חשמליים · התקנה · תיקון · שירות</div>
      <h1>אלחנן שערים חשמליים</h1>
      <p class="lead">פותחים לך את הבית יפה.</p>
    </section>

    <section class="visual" aria-label="שער חשמלי נפתח לסטודיו">
      <div class="house" aria-hidden="true">
        <div class="roof"></div>
        <div class="wall"></div>
        <div class="lamp l"></div>
        <div class="lamp r"></div>
      </div>

      <div class="studio" aria-hidden="true">
        <div class="speaker l"></div>
        <div class="speaker r"></div>
        <div class="mic"></div>
      </div>

      <div class="driveway" aria-hidden="true"></div>

      <div class="gate-area">
        <div class="post l"></div>
        <div class="post r"><div class="keypad"></div></div>
        <div class="motor"></div>
        <div class="track"></div>
        <div class="gate l"></div>
        <div class="gate r"></div>

        <div class="reveal-copy">
          <strong>רוצה שער כזה אצלך?</strong>
          <span>לחיצה אחת — הודעה ישירה לאלחנן</span>
        </div>
      </div>
    </section>

    <section class="bottom">
      <a class="btn" id="openGate" href="#">
        <span id="btnText">פתח את השער</span>
        <span>💬</span>
      </a>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script>
    const page = document.getElementById('page');
    const btn = document.getElementById('openGate');
    const btnText = document.getElementById('btnText');
    const status = document.getElementById('status');

    const phone = '972506363767';
    const message = [
      'שלום אלחנן, ראיתי את הדף שלך על שערים חשמליים.',
      'אני רוצה לבדוק התקנה / תיקון / הצעת מחיר לשער.',
      'אפשר לדבר?'
    ].join('\n');

    const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    let opening = false;

    btn.addEventListener('click', (event) => {
      event.preventDefault();
      if (opening) return;

      opening = true;
      page.classList.add('opened');
      btnText.textContent = 'דברו עם אלחנן בוואטסאפ';
      status.textContent = 'השער נפתח...';

      setTimeout(() => {
        status.textContent = 'מעביר אותך לשיחה';
      }, 900);

      setTimeout(() => {
        window.location.href = whatsappUrl;
      }, 1750);
    });
  </script>
</body>
</html>
