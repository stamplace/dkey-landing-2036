<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>אלחנן אחי | שער חשמלי</title>
  <meta name="description" content="אלחנן אחי — לחצת על שער?" />
  <meta property="og:title" content="אלחנן אחי ⚡" />
  <meta property="og:description" content="לחצת על שער?" />
  <meta name="theme-color" content="#080a10" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%}body{margin:0;overflow:hidden;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:#080a10}.scene{position:relative;min-height:100svh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:24px 16px 22px;isolation:isolate;background:radial-gradient(circle at 50% 18%,rgba(63,95,150,.42),transparent 30%),radial-gradient(circle at 18% 24%,rgba(255,204,112,.17),transparent 18%),linear-gradient(180deg,#05070d,#09111e 52%,#111216)}.house{position:absolute;left:50%;bottom:23vh;width:min(86vw,560px);height:330px;transform:translateX(-50%);z-index:-1;opacity:.78}.roof{position:absolute;top:0;left:0;right:0;height:105px;background:linear-gradient(180deg,#202632,#11161f);clip-path:polygon(4% 100%,50% 8%,96% 100%);filter:drop-shadow(0 18px 40px #000)}.wall{position:absolute;top:92px;left:6%;right:6%;height:230px;border-radius:18px 18px 0 0;background:linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px) 0 0/24px 24px,linear-gradient(180deg,#202632,#111820);box-shadow:0 18px 60px rgba(0,0,0,.45)}.lamp{position:absolute;top:142px;width:18px;height:30px;border-radius:999px;background:linear-gradient(#fff3c7,#e9a426);box-shadow:0 0 24px 9px rgba(247,199,107,.34),0 0 70px 22px rgba(247,199,107,.14)}.lamp.l{left:12%}.lamp.r{right:12%}.drive{position:absolute;left:50%;bottom:-8vh;width:min(112vw,760px);height:44vh;transform:translateX(-50%);clip-path:polygon(28% 0,72% 0,100% 100%,0 100%);background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 2px,transparent 2px 34px),linear-gradient(180deg,#252830,#111318 70%,#07080b);z-index:0}.title{position:relative;z-index:5;text-align:center;text-shadow:0 4px 28px #000}.badge{display:inline-flex;gap:8px;align-items:center;padding:7px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.075);backdrop-filter:blur(12px);font-weight:800;color:rgba(255,255,255,.84);font-size:14px}h1{margin:12px 0 4px;font-size:clamp(44px,14vw,74px);line-height:.9;letter-spacing:-.07em}.sub{margin:0;color:rgba(255,255,255,.76);font-size:clamp(18px,5vw,23px);font-weight:900}.gatebox{position:relative;z-index:2;width:min(94vw,620px);height:min(48vh,390px);margin-top:auto;margin-bottom:8px;display:flex;align-items:flex-end;justify-content:center;perspective:1000px}.post{position:absolute;bottom:0;width:54px;height:85%;border-radius:10px 10px 4px 4px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent 25% 75%,rgba(0,0,0,.25)),repeating-linear-gradient(180deg,#5d5850 0 18px,#46413c 18px 21px,#686158 21px 38px);box-shadow:inset 0 1px 0 rgba(255,255,255,.13),0 20px 38px rgba(0,0,0,.5)}.post.l{left:0}.post.r{right:0}.cap{position:absolute;top:-18px;left:50%;width:70px;height:22px;transform:translateX(-50%);border-radius:10px 10px 4px 4px;background:linear-gradient(#787168,#45413b)}.keypad{position:absolute;right:10px;top:42%;width:26px;height:38px;border-radius:6px;background:#111820;border:1px solid rgba(255,255,255,.16);box-shadow:0 0 14px rgba(37,211,102,.18)}.keypad:before{content:"";position:absolute;inset:7px;background:radial-gradient(circle,#25d366 0 2px,transparent 3px) 0 0/8px 8px}.motor{position:absolute;left:63px;bottom:22px;width:70px;height:62px;border-radius:8px 8px 4px 4px;background:linear-gradient(#303846,#121821);border:1px solid rgba(255,255,255,.13);box-shadow:0 12px 28px rgba(0,0,0,.48);z-index:4}.motor:after{content:"";position:absolute;right:13px;bottom:13px;width:9px;height:9px;border-radius:50%;background:#25d366;box-shadow:0 0 16px #25d366}.track{position:absolute;right:48px;left:48px;bottom:9px;height:8px;border-radius:999px;background:linear-gradient(#5d6673,#1b2027);box-shadow:0 3px 0 rgba(0,0,0,.45);z-index:3}.gate{position:absolute;bottom:22px;width:calc(50% - 48px);height:66%;border-radius:6px;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 15% 85%,rgba(0,0,0,.3)),repeating-linear-gradient(90deg,#202733 0 7px,#10151d 7px 12px,#2b3441 12px 15px,#0f141c 15px 28px),linear-gradient(#2d3542,#111821);border:2px solid rgba(255,255,255,.16);box-shadow:0 22px 38px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.13);transition:transform 1.45s cubic-bezier(.2,.82,.18,1),filter 1.45s}.gate:before,.gate:after{content:"";position:absolute;left:0;right:0;height:14px;background:linear-gradient(#3b4655,#121821);box-shadow:inset 0 1px 0 rgba(255,255,255,.15);z-index:2}.gate:before{top:16px}.gate:after{bottom:20px}.gate.l{left:48px}.gate.r{right:48px}.opened .gate.l{transform:translateX(-86%) rotateY(-8deg);filter:brightness(.85)}.opened .gate.r{transform:translateX(86%) rotateY(8deg);filter:brightness(.85)}.light{position:absolute;bottom:25px;width:12px;height:64%;border-radius:999px;background:linear-gradient(180deg,rgba(247,199,107,.1),rgba(247,199,107,.82),rgba(37,211,102,.18));box-shadow:0 0 34px 10px rgba(247,199,107,.25);opacity:.2;transition:opacity 1.1s,width 1.3s;z-index:1}.opened .light{opacity:.9;width:min(44vw,260px)}.btn{position:relative;z-index:6;display:flex;align-items:center;justify-content:center;gap:10px;width:min(86vw,370px);min-height:64px;margin:auto;padding:16px 22px;border:0;border-radius:999px;color:#08110b;background:linear-gradient(135deg,#2df072,#25d366 45%,#abffd0);font-size:clamp(20px,5.8vw,26px);font-weight:950;text-decoration:none;box-shadow:0 18px 42px rgba(37,211,102,.34),inset 0 1px 0 rgba(255,255,255,.55);cursor:pointer;animation:call 1.6s ease-in-out infinite}@keyframes call{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.025)}}.status{min-height:23px;margin-top:11px;color:rgba(255,255,255,.72);font-weight:800;text-align:center;text-shadow:0 3px 18px #000}.opened .btn{animation:none;background:linear-gradient(135deg,#ffd166,#fff1b8)}@media(max-height:700px){.gatebox{height:42vh}h1{font-size:46px}.btn{min-height:58px}}
  </style>
</head>
<body>
  <main class="scene" id="scene">
    <div class="house" aria-hidden="true"><div class="roof"></div><div class="wall"></div><div class="lamp l"></div><div class="lamp r"></div></div>
    <div class="drive" aria-hidden="true"></div>
    <section class="title"><div class="badge">🎤 קול נדיר · ⚡ שער חשמלי</div><h1>אלחנן אחי</h1><p class="sub">לחצת על שער?</p></section>
    <section class="gatebox" aria-label="שער חשמלי"><div class="post l"><span class="cap"></span></div><div class="post r"><span class="cap"></span><span class="keypad"></span></div><div class="motor"></div><div class="track"></div><div class="light"></div><div class="gate l"></div><div class="gate r"></div></section>
    <section><a class="btn" id="openGate" href="#"><span>פתח את השער</span><small>💬</small></a><div class="status" id="status"></div></section>
  </main>
  <script>
    const scene=document.getElementById('scene');
    const btn=document.getElementById('openGate');
    const status=document.getElementById('status');
    const whatsappUrl='https://wa.me/972506363767?text=%D7%90%D7%9C%D7%97%D7%A0%D7%9F%20%D7%90%D7%97%D7%99%2C%20%D7%9C%D7%97%D7%A6%D7%AA%D7%99%20%D7%A2%D7%9C%20%D7%94%D7%A9%D7%A2%D7%A8%20%F0%9F%98%84%E2%9A%A1';
    let opening=false;
    btn.addEventListener('click',e=>{e.preventDefault();if(opening)return;opening=true;scene.classList.add('opened');btn.querySelector('span').textContent='השער נפתח...';status.textContent='מחבר אותך ל-WhatsApp';setTimeout(()=>{if(whatsappUrl.startsWith('https://wa.me/')) window.location.href=whatsappUrl; else status.textContent='צריך להכניס מספר WhatsApp בקוד';},1550)});
  </script>
</body>
</html>
