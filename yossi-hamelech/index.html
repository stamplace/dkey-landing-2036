<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#050816" />
  <title>אחי יוסי</title>
  <meta name="description" content="יוסי המלך — לחץ כאן יא מלך" />
  <meta property="og:title" content="אחי יוסי 👑" />
  <meta property="og:description" content="זה לא סתם יוסי — זה אחי יוסי." />
  <meta property="og:type" content="website" />
  <style>
    :root{--bg:#050816;--gold:#facc15;--orange:#fb923c;--green:#25D366;--text:#fff7ed;--muted:rgba(255,255,255,.76)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 50% 18%,rgba(250,204,21,.28),transparent 28%),radial-gradient(circle at 82% 78%,rgba(37,211,102,.22),transparent 32%),radial-gradient(circle at 13% 80%,rgba(59,130,246,.19),transparent 31%),linear-gradient(135deg,#050816,#111827 55%,#020617);animation:bg 8s ease-in-out infinite alternate}
    body:after{content:"";position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.85) 1px,transparent 1px);background-size:34px 34px;opacity:.18;mask-image:radial-gradient(circle,#000,transparent 78%)}
    main{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;padding:22px}
    .card{width:min(760px,100%);text-align:center;border:1px solid rgba(255,255,255,.20);border-radius:34px;padding:clamp(28px,6vw,56px);background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));box-shadow:0 30px 100px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.22);backdrop-filter:blur(18px);position:relative;overflow:hidden}
    .card:before{content:"";position:absolute;inset:-2px;background:conic-gradient(from 180deg,transparent,rgba(250,204,21,.50),transparent,rgba(37,211,102,.34),transparent);filter:blur(30px);opacity:.62;z-index:-1;animation:spin 6s linear infinite}
    .badge{display:inline-flex;align-items:center;justify-content:center;gap:10px;border:1px solid rgba(250,204,21,.45);background:rgba(250,204,21,.10);color:#fde68a;border-radius:999px;padding:10px 18px;font-weight:900;margin-bottom:20px;animation:mini 1.7s ease-in-out infinite}
    h1{margin:0;font-size:clamp(48px,12vw,104px);line-height:1;letter-spacing:-.06em;background:linear-gradient(90deg,#fff7ad,var(--gold),var(--orange),#22c55e,#fff7ad);background-size:280% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 18px 25px rgba(0,0,0,.45));animation:gold 3.4s ease-in-out infinite}
    .lines{margin:28px auto 0;display:grid;gap:12px;max-width:620px;font-weight:850;font-size:clamp(20px,4.7vw,34px);line-height:1.25}
    .lines span{display:block;padding:12px 16px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
    .small{font-size:clamp(17px,3.8vw,25px);color:var(--muted);font-weight:750}
    .cta-wrap{margin-top:34px;min-height:105px;display:grid;place-items:center}
    .cta{display:inline-flex;align-items:center;justify-content:center;gap:12px;text-decoration:none;color:#07130b;background:linear-gradient(135deg,#facc15,#fb923c 48%,#25D366);font-size:clamp(24px,5.8vw,40px);font-weight:950;border-radius:999px;padding:20px 34px;box-shadow:0 20px 60px rgba(37,211,102,.28),0 0 0 12px rgba(250,204,21,.08);animation:move 1.25s ease-in-out infinite, glow 1.8s ease-in-out infinite}
    .spark{position:absolute;font-size:28px;animation:float 4.4s ease-in-out infinite;opacity:.85}.s1{top:12%;right:11%}.s2{top:18%;left:12%;animation-delay:.6s}.s3{bottom:13%;right:17%;animation-delay:1.1s}.s4{bottom:18%;left:16%;animation-delay:1.7s}
    @keyframes bg{to{transform:scale(1.06) rotate(2deg);filter:saturate(1.2)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes gold{0%,100%{background-position:0 50%}50%{background-position:100% 50%}}@keyframes move{0%,100%{transform:translate(0,0) rotate(0) scale(1)}25%{transform:translate(8px,-8px) rotate(1.5deg) scale(1.04)}50%{transform:translate(-8px,6px) rotate(-1.3deg)}75%{transform:translate(4px,8px) rotate(.8deg) scale(1.03)}}@keyframes glow{50%{box-shadow:0 26px 90px rgba(250,204,21,.32),0 0 0 20px rgba(37,211,102,.11)}}@keyframes mini{50%{transform:translateY(-4px)}}@keyframes float{50%{transform:translateY(-22px) rotate(12deg);opacity:1}}
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="spark s1">👑</div><div class="spark s2">💬</div><div class="spark s3">✨</div><div class="spark s4">😄</div>
      <div class="badge">😄👑 אחי יוסי</div>
      <h1>יוסי המלך</h1>
      <div class="lines">
        <span>אותרה רמת אחווה חריגה.</span>
        <span class="small">המערכת זיהתה:</span>
        <span>זה לא סתם יוסי — זה אחי יוסי.</span>
      </div>
      <div class="cta-wrap">
        <a class="cta" href="https://wa.me/972543139998?text=%D7%99%D7%95%D7%A1%D7%99%20%D7%94%D7%9E%D7%9C%D7%9A%20%F0%9F%91%91" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
          לחץ כאן יא מלך 💬
        </a>
      </div>
    </section>
  </main>
</body>
</html>
